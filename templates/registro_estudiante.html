<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>
</head>
<body>
    <h2>Registro Estudiante</h2>
    <form method="POST">
        Nombre: <input type="text" name="txtnombre"><br><br>
        Edad: <input type="number" name="txtedad"><br><br>
        Carrera: <input type="text" name="txtcarrera"><br><br>
        Nota 1: <input type="number" step="0.1"name="txtnota1"><br><br>
        Nota 2: <input type="number" step="0.1"name="txtnota2"><br><br>
        Nota 3: <input type="number" step="0.1"name="txtnota3"><br><br>
        <button type="submit">Ingresar</button>
    </form>
</body>
</html>
